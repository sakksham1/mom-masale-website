name: Generate Site (Products + Recipes)

on:
  push:
    branches: [main]
    paths:
      - 'data/products.json'
      - 'data/recipes.json'
      - 'scripts/build-site.js'
      - 'scripts/product-template.html'
      - 'scripts/recipe-template.html'
      - 'css/style.css'
      - 'js/main.js'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run generator
        run: node scripts/build-site.js

      - name: Minify assets
        run: |
          npm install clean-css terser --no-save
          node scripts/minify-assets.js

      - name: Commit generated pages if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add products/ recipes/ sitemap.xml data/.lastmod-cache.json css/style.min.css js/main.min.js index.html products.html about.html contact.html recipes.html 404.html scripts/product-template.html scripts/recipe-template.html
          if git diff --cached --quiet; then
            echo "No changes to commit — output already up to date."
          else
            git commit -m "chore: regenerate site + minified assets [skip ci]"
            git push
          fi