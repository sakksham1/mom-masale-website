name: Generate Site (Products + Recipes)

on:
  push:
    branches: [main]
    paths:
      - 'data/products.json'
      - 'data/recipes.json'
      - 'scripts/build-site.js'
      - 'scripts/product-template.html'
      - 'scripts/recipe-template.html'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run generator
        run: node scripts/build-site.js

      - name: Commit generated pages if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add products/ recipes/ sitemap.xml
          if git diff --cached --quiet; then
            echo "No changes to commit — output already up to date."
          else
            git commit -m "chore: regenerate product/recipe pages and sitemap [skip ci]"
            git push
          fi